# Layanan database
services:
  db-webdinamis:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: dbcompro
      MARIADB_USER: userwebdinamis_2388010029
      MARIADB_PASSWORD: 12345
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/dbcompro_nim.sql:/docker-entrypoint-initdb.d/dbcompro_nim.sql:ro
    restart: always

  container-statis:
    image: anssipaaa/dbcompro:latest
    ports:
      - "80:80"
    restart: always

  container-dinamis:
    image: anssipaaa/web-dinamis:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_USER: userwebdinamis_2388010029
      DB_PASSWORD: 12345
      DB_NAME: dbcompro
      DB_HOST: localhost
      NEXTAUTH_SECRET: your-super-secret-key-1234
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}